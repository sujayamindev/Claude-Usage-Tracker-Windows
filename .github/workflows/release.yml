name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Determine version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: dotnet test src/ClaudeUsageTracker.Windows.Tests/ClaudeUsageTracker.Windows.Tests.csproj -c Release

      - name: Publish self-contained build
        run: >
          dotnet publish src/ClaudeUsageTracker.Windows/ClaudeUsageTracker.Windows.csproj
          -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false
          -o installer/publish

      - name: Compile installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.version }} installer\setup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeUsageTracker-Setup-${{ steps.version.outputs.version }}
          path: installer/output/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/*.exe
          generate_release_notes: true
