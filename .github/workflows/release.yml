name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"

      - name: Determine version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: dotnet test src/ClaudeUsageTracker.Windows.Tests/ClaudeUsageTracker.Windows.Tests.csproj -c Release

      - name: Publish self-contained build
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: >
          dotnet publish src/ClaudeUsageTracker.Windows/ClaudeUsageTracker.Windows.csproj
          -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false
          -p:Version=$env:BUILD_VERSION
          -o installer/publish

      - name: Compile installer
        shell: cmd
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=%BUILD_VERSION% installer\setup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ClaudeUsageTracker-Setup-${{ steps.version.outputs.version }}
          path: installer/output/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: installer/output/*.exe
          generate_release_notes: true
